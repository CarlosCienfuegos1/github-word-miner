<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miner de Palabras · Ranking en Vivo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e14;
      --surface:   #111520;
      --border:    #1e2535;
      --accent-py: #3fb950;
      --accent-jv: #f78166;
      --accent-al: #58a6ff;
      --text:      #c9d1d9;
      --muted:     #484f58;
      --heading:   #e6edf3;
      --mono:      'JetBrains Mono', 'Fira Code', monospace;
      --sans:      'Segoe UI', system-ui, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text);
                 font-family: var(--sans); font-size: 14px; line-height: 1.5; }

    .shell { display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 15px; font-weight: 700;
      color: var(--heading); letter-spacing: -0.3px;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
      transition: background .5s;
    }
    .status-dot.live {
      background: var(--accent-py);
      box-shadow: 0 0 6px var(--accent-py);
      animation: pulso 2s infinite;
    }
    @keyframes pulso { 0%,100%{opacity:1} 50%{opacity:.3} }

    .controles { display: flex; align-items: center; gap: 16px; }

    .grupo-tabs {
      display: flex; gap: 4px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 3px;
    }

    .tab {
      padding: 4px 14px; border-radius: 6px; border: none;
      background: transparent; color: var(--muted);
      font-family: var(--mono); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .2s, color .2s; letter-spacing: .3px;
    }
    .tab:hover { color: var(--text); }
    .tab.activo[data-lang="all"]    { background: #1a2744; color: var(--accent-al); }
    .tab.activo[data-lang="python"] { background: #0d2318; color: var(--accent-py); }
    .tab.activo[data-lang="java"]   { background: #2b1810; color: var(--accent-jv); }

    .grupo-slider { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .grupo-slider input[type=range] {
      -webkit-appearance: none; width: 100px; height: 4px;
      background: var(--border); border-radius: 2px; outline: none;
    }
    .grupo-slider input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent-al); cursor: pointer;
    }
    #topN-label { font-family: var(--mono); font-weight: 700; color: var(--text); min-width: 24px; }

    .indicador-vivo { display: flex; align-items: center; gap: 6px;
                      font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .contenido { display: grid; grid-template-columns: 1fr 300px; overflow: hidden; }

    .panel-grafico { padding: 24px; overflow: hidden; display: flex; flex-direction: column; gap: 16px; }

    .titulo-grafico {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted);
    }

    .contenedor-grafico { flex: 1; position: relative; min-height: 0; }

    .barra-lateral { border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

    .seccion-lateral { padding: 16px 20px; border-bottom: 1px solid var(--border); }

    .etiqueta-lateral {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.4px; color: var(--muted); margin-bottom: 12px;
    }

    .fila-stat { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; }
    .etiqueta-stat { color: var(--muted); font-size: 12px; }
    .valor-stat { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--heading); transition: color .4s; }
    .valor-stat.flash { color: var(--accent-al); }

    .lista-ranking { flex: 1; overflow-y: auto; padding: 0 20px 16px;
                     scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .item-ranking {
      display: grid; grid-template-columns: 28px 1fr auto;
      align-items: center; gap: 8px; padding: 7px 0;
      border-bottom: 1px solid var(--border);
      animation: aparecer .3s ease;
    }
    .item-ranking:last-child { border-bottom: none; }

    @keyframes aparecer { from{opacity:0;transform:translateX(8px)} to{opacity:1;transform:translateX(0)} }

    .num-ranking   { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; }
    .palabra-ranking { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--heading);
                       overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .contenedor-barra { width: 60px; display: flex; align-items: center; gap: 6px; }
    .fondo-barra { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .barra { height: 100%; border-radius: 2px; background: var(--accent-al); transition: width .5s ease; }
    .conteo { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 32px; text-align: right; }

    .vacio {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: var(--muted); font-family: var(--mono); font-size: 13px;
    }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border);
               border-top-color: var(--accent-al); border-radius: 50%; animation: girar 1s linear infinite; }
    @keyframes girar { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61
                 c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0
                 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09
                 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61
                 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
      </svg>
      word-miner <span style="color:var(--muted);font-weight:400">/ en vivo</span>
    </div>

    <div class="controles">
      <div class="grupo-tabs">
        <button class="tab activo" data-lang="all">todos</button>
        <button class="tab" data-lang="python">python</button>
        <button class="tab" data-lang="java">java</button>
      </div>

      <div class="grupo-slider">
        <span>top</span>
        <input type="range" id="topN-slider" min="5" max="50" value="20" step="5" />
        <span id="topN-label">20</span>
      </div>

      <div class="indicador-vivo">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">conectando…</span>
      </div>
    </div>
  </header>

  <div class="contenido">
    <div class="panel-grafico">
      <div class="titulo-grafico" id="titulo-grafico">Palabras más usadas en todos los lenguajes</div>
      <div class="contenedor-grafico">
        <div class="vacio" id="estado-vacio">
          <div class="spinner"></div>
          <span>Esperando datos del miner…</span>
        </div>
        <canvas id="grafico" style="display:none"></canvas>
      </div>
    </div>

    <div class="barra-lateral">
      <div class="seccion-lateral">
        <div class="etiqueta-lateral">Estadísticas del Miner</div>
        <div class="fila-stat"><span class="etiqueta-stat">repositorios procesados</span><span class="valor-stat" id="stat-repos">—</span></div>
        <div class="fila-stat"><span class="etiqueta-stat">palabras extraídas</span>    <span class="valor-stat" id="stat-words">—</span></div>
        <div class="fila-stat"><span class="etiqueta-stat">únicas (python)</span>        <span class="valor-stat" id="stat-py">—</span></div>
        <div class="fila-stat"><span class="etiqueta-stat">únicas (java)</span>          <span class="valor-stat" id="stat-jv">—</span></div>
      </div>
      <div class="etiqueta-lateral" style="padding:16px 20px 0">Ranking</div>
      <div class="lista-ranking" id="lista-ranking"></div>
    </div>
  </div>
</div>

<script>
const COLOR_LANG = { all: '#58a6ff', python: '#3fb950', java: '#f78166' };
const TITULO_GRAFICO = {
  all:    'Palabras más usadas en todos los lenguajes',
  python: 'Palabras más usadas · Python',
  java:   'Palabras más usadas · Java',
};

let langActual = 'all';
let topNActual = 20;
let fuenteSSE  = null;
let grafico    = null;

// ── Construcción del gráfico ────────────────────────────────────────────────
function construirGrafico(etiquetas, valores, lang) {
  const ctx      = document.getElementById('grafico').getContext('2d');
  const color    = COLOR_LANG[lang];
  const gradiente = ctx.createLinearGradient(0, 0, 0, 400);
  gradiente.addColorStop(0, color + 'cc');
  gradiente.addColorStop(1, color + '22');

  return new Chart(ctx, {
    type: 'bar',
    data: {
      labels: etiquetas,
      datasets: [{ data: valores, backgroundColor: gradiente,
                   borderColor: color, borderWidth: 1,
                   borderRadius: 4, borderSkipped: false }]
    },
    options: {
      indexAxis: 'y',
      animation: { duration: 500 },
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111520', borderColor: '#1e2535', borderWidth: 1,
          titleColor: '#e6edf3', bodyColor: '#c9d1d9',
          callbacks: { label: ctx => ` ${ctx.raw.toLocaleString()} apariciones` }
        }
      },
      scales: {
        x: { grid: { color: '#1e2535' },
             ticks: { color: '#484f58', font: { family: 'monospace', size: 11 } } },
        y: { grid: { display: false },
             ticks: { color: '#c9d1d9', font: { family: 'monospace', size: 12 } } }
      }
    }
  });
}

// ── Actualización de la interfaz ────────────────────────────────────────────
function actualizarUI({ words, meta }) {
  document.getElementById('status-dot').classList.add('live');
  document.getElementById('status-text').textContent = 'en vivo';

  flashear('stat-repos', meta.repos_processed.toLocaleString());
  flashear('stat-words', meta.words_total.toLocaleString());
  flashear('stat-py',    meta.python_total.toLocaleString());
  flashear('stat-jv',    meta.java_total.toLocaleString());

  if (!words?.length) return;

  document.getElementById('estado-vacio').style.display = 'none';
  const canvas = document.getElementById('grafico');
  canvas.style.display = 'block';

  const etiquetas = words.map(w => w.word);
  const valores   = words.map(w => w.count);
  const color     = COLOR_LANG[langActual];

  if (!grafico) {
    grafico = construirGrafico(etiquetas, valores, langActual);
  } else {
    const ctx      = canvas.getContext('2d');
    const gradiente = ctx.createLinearGradient(0, 0, 0, 400);
    gradiente.addColorStop(0, color + 'cc');
    gradiente.addColorStop(1, color + '22');
    grafico.data.labels = etiquetas;
    grafico.data.datasets[0].data            = valores;
    grafico.data.datasets[0].borderColor     = color;
    grafico.data.datasets[0].backgroundColor = gradiente;
    grafico.update('active');
  }

  document.getElementById('titulo-grafico').textContent = TITULO_GRAFICO[langActual];
  renderizarRanking(words, valores[0]);
}

function flashear(id, valor) {
  const el = document.getElementById(id);
  if (el.textContent !== valor) {
    el.textContent = valor;
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 800);
  }
}

function renderizarRanking(words, maxConteo) {
  const color = COLOR_LANG[langActual];
  document.getElementById('lista-ranking').innerHTML = words.map((w, i) => {
    const pct = maxConteo > 0 ? (w.count / maxConteo * 100).toFixed(1) : 0;
    return `
      <div class="item-ranking">
        <span class="num-ranking">${i + 1}</span>
        <span class="palabra-ranking">${w.word}</span>
        <div class="contenedor-barra">
          <div class="fondo-barra">
            <div class="barra" style="width:${pct}%;background:${color}"></div>
          </div>
          <span class="conteo">${w.count.toLocaleString()}</span>
        </div>
      </div>`;
  }).join('');
}

// ── Conexión SSE ────────────────────────────────────────────────────────────
function conectar() {
  fuenteSSE?.close();
  fuenteSSE = new EventSource(`/stream?language=${langActual}&top_n=${topNActual}`);

  fuenteSSE.onmessage = ({ data }) => {
    try {
      const payload = JSON.parse(data);
      if (!payload.error) actualizarUI(payload);
    } catch (_) {}
  };

  fuenteSSE.onerror = () => {
    document.getElementById('status-dot').classList.remove('live');
    document.getElementById('status-text').textContent = 'reconectando…';
  };
}

// ── Controles ───────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
    langActual = btn.dataset.lang;
    if (grafico) { grafico.destroy(); grafico = null; }
    conectar();
  });
});

const slider = document.getElementById('topN-slider');
let debounce = null;
slider.addEventListener('input', () => {
  topNActual = parseInt(slider.value, 10);
  document.getElementById('topN-label').textContent = topNActual;
  clearTimeout(debounce);
  debounce = setTimeout(conectar, 400);
});

conectar();
</script>
</body>
</html>
